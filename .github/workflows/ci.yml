name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Black format check
        run: black --check src tests
      - name: Spell check
        run: codespell
      - name: Mypy
        run: mypy src
      - name: Pytest
        run: pytest
