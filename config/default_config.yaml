app:
  schema_version: "0.1.0"
  output_root: null
  source_root: null
  log_level: "INFO"

aws:
  profile: "proposal-assistant"
  region: "us-east-1"

bedrock:
  model_label: "opus-4.6"
  model_id: "us.anthropic.claude-opus-4-6-v1"
  max_direct_upload_mb: 20
  save_raw_model_responses: true
  mock_bedrock: false
  temperature: 0
  max_tokens: 4096
  retry_invalid_json_once: true

scanner:
  year_folder_regex: "^20[0-9]{2}$"
  ignore_stray_files_in_year_folders: true
  skip_hidden_files: true
  skip_system_files: true
  skip_temp_office_files: true
  hash_algorithm: "sha256"

tracker:
  enabled: true
  path: null
  sheet_name: null
  header_row: 0

processing:
  direct_upload_default: true
  excel_local_extract_first: true
  local_extract_max_chars: 200000
  tiny_excel_max_sheets: 3
  tiny_excel_max_nonempty_cells: 500
  tiny_excel_max_size_mb: 1
  ocr_enabled: false
  pass2_enabled: true
  pass2_confidence_threshold: 0.65
  stop_before_clean_set_if_critical_questions: true

questions:
  suppress_low_priority: true
  target_questions_per_file: 3

review:
  max_questions_per_proposal: 3
  max_questions_per_run: 20
  include_low_priority: false

clean_set:
  sanitize_filenames: true
  flatten_documents_folder: true
  copy_excluded_files: false
  require_manual_review_clearance: true

s3_manifest:
  enabled: true
  base_prefix: "proposal-history"

synthesis:
  policies_path: null
  max_full_text_documents: 8
  max_full_text_chars_per_doc: 6000
